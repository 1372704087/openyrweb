# Engine rules override (merged with the base rulesmd.ini).
# Contains YR bug-fixes + multiplayer defaults + required engine entries.

[MultiplayerDialogSettings]
# Original was 1, but it was ignored
MinUnitCount=0
# We use some custom values for default game options
UnitCount=0
Crates=no
SuperWeapons=no

# Prevent hospital abuses (fix from YR)
[CATHOSP]
LegalTarget=yes

# Prevent hospital abuses (fix from YR)
[CAHOSP]
LegalTarget=yes

[CAEURO05]
# The Shp file doesn't actually have a rubble frame
LeaveRubble=no

[CASTL01]
# The Shp file doesn't actually have a rubble frame
LeaveRubble=no

[NAMISL]
# Fix from YR, allowing nuke to damage the nuke silo it was fired from
DamageSelf=yes

# Fix invalid value 0,01
[BLUELAMP]
LightGreenTint=0.01

# Fix invalid value 0,01
[INBLULMP]
LightGreenTint=0.01

# Soylent fixes from YR (prevent sell for profit via cloning vats)

[TANY]
Soylent=500

[CLEG]
Soylent=750

[SPY]
Soylent=500

[PTROOP]
Soylent=500

[E1]
Soylent=100

[SNIPE]
Soylent=300

# Animation fix from YR
[TerrorBombWH]
AnimList=MININUKE

# Animation fix from YR
[CRNUKEWH]
AnimList=MININUKE

[FlakGuyAAGunE]
Damage=20 ; should be identical to FlakGuyAAGun damage (was 8 in RA2 and YR, probably by mistake)

[FlakTrackAAGunE]
Damage=35 ; should be identical to FlakTrackAAGun damage (was 20 in RA2 and YR, probably by mistake)
Range=10 ; should be identical to FlakTrackAAGun range (was 8 in RA2 and YR, probably by mistake)

[FlakWeaponE]
Damage=40 ; should be identical to FlakWeapon damage (was 35 in RA2 and YR, probably by mistake)
Range=12 ; should be identical to FlakWeapon range (was 10 in RA2 and YR, probably by mistake)

# OpenYRWeb: expose the Yuri (ThirdSide) faction as a playable skirmish country. Vanilla YR
# registers YuriCountry as the ThirdSide country; mergeWith() appends it to [Countries] and
# creates/merges its section. CountryRules maps "YuriCountry" -> SideType.ThirdSide (which is
# already fully implemented). UIName uses the NOSTR: prefix so Strings.get() returns the
# literal "Yuri" verbatim without a console warning (no NAME:Yuri key exists in the CSF).
[Countries]
9=YuriCountry

[YuriCountry]
Side=ThirdSide
UIName=NOSTR:Yuri
Multiplay=yes

# Custom config follows. These entries must be present for the game to work.

[General]
ParadropPlane=PDPLANE

[AudioVisual]
QuickMatchTimer=MenuBuild
PartyInvite=PartyInvite
PartyFormed=PartyFormed
FlyerHelper=FLYERHELPER
BenderOfSpoons=YURI

[BuildingTypes]
# Use ids starting with 10000 to avoid collisions with original IDs or re-ordering indices
10000=GAGATE_A ; was defined under OverlayTypes by mistake and was later fixed in YR

[Animations]
# Use ids starting with 10000 to avoid collisions with original IDs or re-ordering indices
10000=OREGATH
10001=WRENCH
10002=FLYERHELPER
10003=BOMBCURS
10004=BBBLELRG
10005=PBEACON
10006=SMOKEY2 # was commented out, but the animation has to be usable
10007=GAWETH_ED # had a typo (- instead of =)
10008=GAWETH_GD # had a typo (- instead of =)

# End required entries
# Add custom stuff below this line.

; === OpenYRWeb: Gattling weapons are multi-purpose (AA + AG), matching vanilla YR ===
; The Invisible projectile is used by beam/laser weapons including all gattling stages.
[Invisible]
AA=yes
AG=yes
