; ============================================================
; config.ini — YRWeb private/offline deployment (A4 MVP)
; ============================================================
; Served by server/index.mjs in place of the official config.ini.
; This is the trimmed version for 100% offline single-player / skirmish / replay.
;
; Key changes vs the official config.ini:
;   - NO [Sentry] section  -> Sentry never initializes (Application.ts.js:496 guards on its presence).
;   - NO external hosts    -> all URL keys either omitted or local (disabled).
;   - gameResArchiveUrl / gameresBaseUrl left empty -> user must supply their own RA2/YR files
;     (Local mode, File System Access folder picker). This avoids any archive.org/CDN fetch.
;
; servers.ini is NOT fetched on the single-player path (only at multiplayer login),
; so serversUrl can keep its default "servers.ini".

[General]
; --- Locale / viewport (boot requirements) ---
defaultLanguage=zh-TW
viewport.width=1024
viewport.height=768

; --- Feature flags ---
quickMatchEnabled=yes
unrankedQueueEnabled=yes
botsEnabled=yes

; --- Game resources ---
; gameresBaseUrl empty = no CDN; resources come from archive import or local folder.
; The one-click button (in the import dialog) downloads both exes below and auto-extracts
; the 6 required mix files (ra2/language/multi + ra2md/langmd/multimd/expandmd01).
; These are the official XWIS multiplayer-only installers mirrored on archive.org.
; Leave a URL empty to hide the one-click button (users still get folder/archive import).
gameresBaseUrl=
gameResArchiveUrl=https://archive.org/download/red-alert-2-multiplayer/Red-Alert-2-Multiplayer.exe
gameResExpansionArchiveUrl=https://archive.org/download/yuris-revenge-multiplayer/Yuris-Revenge-Multiplayer.exe

; OpenYRWeb: archive.org's download CDN does not send CORS headers, so browser fetches
; fail cross-origin. Route them through our same-origin /cors-proxy endpoint (server/index.mjs).
; The engine builds: <proxy> + encodeURIComponent(fullUrl) -> /cors-proxy?url=https%3A%2F%2F...
[CorsProxy]
archive.org=/cors-proxy?url=

; --- UI links: blanked (buttons hide or go nowhere; no external navigation) ---
discordUrl=
patchNotesUrl=
ladderRulesUrl=
modSdkUrl=
donateUrl=
breakingNewsUrl=
oldClientsBaseUrl=

; --- Maps / mods (community downloads; not needed offline) ---
mapsBaseUrl=
modsBaseUrl=

; --- Replay remote whitelist: empty = no remote replay fetch (local replays still work) ---
replaysUrlWhitelist=

; --- Debug (off for normal play) ---
; debugLogging=wol
; debugGameState=yes

; (No [Sentry] section -> error reporting disabled, fully offline)
; (No [CorsProxy] section -> no proxying; we don't fetch archives cross-origin in Local mode)
